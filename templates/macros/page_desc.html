{% macro page_desc(desc, page) %}

<div id="banner-container-home">
    <div id="home-banner-text">
        <div class="home-banner-header">{{ desc.title }}</div>
        <section id="banner-home-subtitle">
            {{ page.content | safe }}
        </section>
    </div>
    <div class="image-container-home">
        <img
            alt="the owner"
            class="banner-home-img"
            src="{{ get_url(path='img/penguin-192.webp') }}"
            srcset="{{ get_url(path='img/penguin-192.webp') }} 192w, {{ get_url(path='img/penguin-384.webp') }} 384w, {{ desc.img | replace(from='$BASE_URL', to=config.base_url) | safe }} 460w"
            sizes="(max-width: 600px) 192px, 192px"
            width="460"
            height="460"
            fetchpriority="high"
            decoding="async"
        />
    </div>
</div>

{% endmacro %}
